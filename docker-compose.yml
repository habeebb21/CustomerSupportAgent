services:
  n8n:
    image: n8nio/n8n
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      - GENERIC_TIMEZONE=Africa/Cairo
      - TZ=Africa/Cairo
      - N8N_EDITOR_BASE_URL=${WEBHOOK_URL:-http://localhost:5678}
      - WEBHOOK_URL=${WEBHOOK_URL:-http://localhost:5678}
    networks:
      - n8n_net

  ngrok:
    image: ngrok/ngrok:latest
    container_name: n8n_ngrok
    restart: unless-stopped
    command: http n8n:5678 --log=stdout
    environment:
      - NGROK_AUTHTOKEN=39bY3xvcZZ6T7gxFysk7I9oI6bz_5raVRndne3LgvEStnWwni
    ports:
      - "4040:4040"
    depends_on:
      - n8n
    networks:
      - n8n_net

networks:
  n8n_net:
    driver: bridge

volumes:
  n8n_data:
    external: true
